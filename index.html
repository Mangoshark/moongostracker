<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mngo — Moongo's Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --mango:#FF8A3D;
    --mango-deep:#F5701A;
    --yellow:#FFC845;
    --tomato:#E8492A;
    --leaf:#3FA968;
    --leaf-deep:#2F8A54;
    --ink:#2B2318;
    --ink-soft:#6B5F4F;
    --paper:#FFF9F0;
    --card:#FFFFFF;
    --line:#EFE3D0;
    --shadow: 0 2px 10px rgba(43,35,24,0.06), 0 1px 2px rgba(43,35,24,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.02em;
    font-weight:800;
    margin:0;
  }
  #app{max-width:960px;margin:0 auto;padding:0 0 60px;}

  /* NAV */
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px 14px;
    flex-wrap:wrap;
    gap:10px;
    border-bottom:2px solid var(--line);
    background:var(--paper);
    position:sticky;
    top:0;
    z-index:10;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:800;
    font-size:26px;
    letter-spacing:0.03em;
    color:var(--ink);
  }
  .barbell{display:flex;align-items:center;gap:2px;}
  .plate{width:11px;height:11px;border-radius:50%;background:var(--mango);}
  .plate.y{background:var(--yellow);}
  .plate.g{background:var(--leaf);}
  .bar{width:26px;height:4px;background:var(--ink);border-radius:2px;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:8px 14px;
    border-radius:999px;
    border:2px solid transparent;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .tab.active{background:var(--ink);color:var(--paper);}
  .tab:hover:not(.active){border-color:var(--line);color:var(--ink);}

  .main{padding:22px 20px 10px;}

  /* Buttons */
  button{font-family:inherit;cursor:pointer;}
  .btn{
    border:none;
    border-radius:999px;
    padding:9px 16px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    background:var(--mango);
    color:#fff;
  }
  .btn:hover{background:var(--mango-deep);}
  .btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--line);}
  .btn.ghost:hover{border-color:var(--mango);color:var(--mango-deep);}
  .btn.small{padding:5px 11px;font-size:13px;}
  .btn.danger{background:var(--tomato);}
  .btn.danger:hover{background:#c73a1e;}
  .icon-btn{
    border:none;background:transparent;color:var(--ink-soft);font-size:18px;
    width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{background:var(--line);color:var(--ink);}

  /* Auth box */
  .auth-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sync-badge{
    font-family:'Barlow Condensed';font-weight:700;font-size:12.5px;letter-spacing:0.03em;text-transform:uppercase;
    padding:6px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;
  }
  .sync-badge.local{background:var(--line);color:var(--ink-soft);}
  .sync-badge.cloud{background:var(--leaf);color:#fff;}
  .sync-badge.syncing{background:var(--yellow);color:var(--ink);}

  /* Day view */
  .day-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .day-title{font-size:30px;}
  .day-sub{font-family:'Inter';font-size:13px;color:var(--ink-soft);font-weight:500;}
  .day-nav{display:flex;align-items:center;gap:4px;}
  .view-links{display:flex;gap:8px;}

  .lift-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .lift-card.opted{border-left:5px solid var(--tomato);}
  .lift-card.circuit{border-left:5px solid var(--leaf);}
  .lift-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .kind-badge{
    font-family:'Barlow Condensed';font-weight:700;font-size:11.5px;letter-spacing:0.05em;
    background:var(--leaf);color:#fff;padding:4px 9px;border-radius:999px;
  }
  select, input[type=text], input[type=number], textarea{
    font-family:'Inter';
    border:1.5px solid var(--line);
    border-radius:9px;
    padding:7px 10px;
    font-size:14px;
    color:var(--ink);
    background:#fff;
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--mango);outline-offset:1px;}
  .exercise-select{font-weight:600;font-size:16px;min-width:190px;}
  .newex-row{display:flex;gap:6px;align-items:center;}
  .newex-row input{width:140px;}

  .optout-toggle{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:13px;color:var(--ink-soft);font-weight:600;}
  .reason-box{width:100%;min-height:54px;resize:vertical;margin-top:8px;font-size:14px;}

  table.sets{width:100%;border-collapse:collapse;margin-top:8px;}
  table.sets th{
    font-family:'Barlow Condensed';font-size:13px;letter-spacing:0.04em;text-transform:uppercase;
    color:var(--ink-soft);text-align:left;padding:4px 6px;border-bottom:1.5px solid var(--line);
  }
  table.sets td{padding:5px 6px;vertical-align:middle;}
  table.sets input[type=number]{width:64px;}

  /* custom checkboxes */
  .chk{
    appearance:none;-webkit-appearance:none;
    width:26px;height:26px;border-radius:50%;
    border:2.5px solid var(--line);
    cursor:pointer;position:relative;background:#fff;
  }
  .chk.done:checked{background:var(--leaf);border-color:var(--leaf-deep);}
  .chk.done:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;}
  .chk.pr{border-radius:6px;}
  .chk.pr:checked{background:var(--yellow);border-color:#D9A424;}
  .chk.pr:checked::after{content:'★';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;}
  .chk.opt:checked{background:var(--tomato);border-color:#B93A20;}
  .chk.opt:checked::after{content:'×';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;}

  .row-del{background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;}
  .row-del:hover{color:var(--tomato);}
  .add-set-btn{margin-top:8px;}
  .lift-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  .empty-note{color:var(--ink-soft);font-size:14px;padding:30px 0;text-align:center;}

  /* Week view */
  .week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:8px;}
  .day-card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;
    box-shadow:var(--shadow);min-height:120px;display:flex;flex-direction:column;gap:6px;
  }
  .day-card:hover{border-color:var(--mango);}
  .day-card.today{outline:2.5px solid var(--mango);}
  .day-card .dname{font-family:'Barlow Condensed';font-weight:700;font-size:15px;color:var(--ink-soft);text-transform:uppercase;}
  .day-card .dnum{font-family:'Barlow Condensed';font-weight:800;font-size:24px;}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;}
  .dot-none{background:var(--line);}
  .dot-done{background:var(--leaf);}
  .dot-partial{background:var(--yellow);}
  .dot-logged{background:var(--mango);}
  .dot-optout{background:var(--tomato);}
  .exlist{font-size:12px;color:var(--ink-soft);line-height:1.4;}

  /* Month view */
  .month-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .weekday-row{display:grid;grid-template-columns:44px repeat(7,1fr);gap:6px;font-family:'Barlow Condensed';font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;padding:0 2px;margin-bottom:4px;}
  .week-row{display:grid;grid-template-columns:44px repeat(7,1fr);gap:6px;margin-bottom:6px;align-items:stretch;}
  .week-btn{
    background:var(--ink);color:var(--paper);border:none;border-radius:10px;font-family:'Barlow Condensed';
    font-weight:700;font-size:12px;writing-mode:vertical-rl;text-orientation:mixed;cursor:pointer;padding:6px 0;
  }
  .week-btn:hover{background:var(--mango-deep);}
  .month-cell{
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 6px;min-height:64px;cursor:pointer;
    display:flex;flex-direction:column;gap:6px;
  }
  .month-cell:hover{border-color:var(--mango);}
  .month-cell.outside{opacity:0.35;}
  .month-cell.today{outline:2.5px solid var(--mango);}
  .mnum{font-family:'Barlow Condensed';font-weight:700;font-size:16px;}

  /* PR view */
  .pr-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .pr-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .pr-table th{background:var(--ink);color:var(--paper);font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;font-size:13px;padding:8px 12px;text-align:left;}
  .pr-table td{padding:8px 12px;border-bottom:1px solid var(--line);font-size:14px;}
  .pr-table tr:last-child td{border-bottom:none;}
  .best-badge{background:var(--yellow);color:var(--ink);font-weight:700;font-size:11px;padding:2px 8px;border-radius:999px;margin-left:6px;}
  .chart-wrap{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:18px;}

  /* Notes box */
  .notes-box{border-color:var(--line);background:#FFFDF8;}
  .notes-box::placeholder{color:#B9AC94;}

  /* Progress view */
  .progress-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft);margin-bottom:10px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend-dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .legend-dot.pr{background:var(--yellow);}
  .legend-dot.done{background:var(--mango);}
  .legend-dot.logged{background:var(--line);border:1.5px solid var(--ink-soft);}
  .legend-dot.opt{background:var(--tomato);border-radius:3px;}
  .detail-card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    box-shadow:var(--shadow);margin-top:14px;
  }
  .detail-card h4{font-size:20px;margin-bottom:8px;}
  .detail-row{display:flex;gap:8px;font-size:14px;padding:3px 0;}
  .detail-row .k{color:var(--ink-soft);font-weight:600;min-width:110px;}
  .detail-close{float:right;}

  /* Export view */
  .export-controls{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:18px;}
  .export-field{display:flex;flex-direction:column;gap:4px;}
  .export-field label{font-family:'Barlow Condensed';font-size:13px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;color:var(--ink-soft);}
  .export-actions{display:flex;gap:10px;flex-wrap:wrap;}

  /* Exercises view */
  .chip-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
  .chip{
    background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:7px 8px 7px 14px;
    display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;
  }
  .chip button{background:none;border:none;color:var(--ink-soft);font-size:15px;}
  .chip button:hover{color:var(--tomato);}
  .type-mini{font-size:12px;padding:4px 6px;border-radius:999px;}
  .add-ex-row{display:flex;gap:8px;flex-wrap:wrap;}
  .add-ex-row input{flex:1;max-width:280px;}

  /* Circuits view */
  .circuit-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
  .circuit-tpl{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);}
  .circuit-tpl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .circuit-tpl-head strong{font-family:'Barlow Condensed';font-size:17px;letter-spacing:0.02em;text-transform:uppercase;}

  /* Save status pill */
  .save-pill{
    font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:0.03em;text-transform:uppercase;
    padding:5px 11px;border-radius:999px;background:var(--line);color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:5px;transition:background .25s,color .25s;
  }
  .save-pill.saving{background:var(--yellow);color:var(--ink);}
  .save-pill.saved{background:var(--leaf);color:#fff;}
  .save-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  /* Autofill suggestion bar */
  .autofill-bar{
    display:none;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    background:#FFF3E0;border:1.5px dashed var(--mango);border-radius:10px;
    padding:8px 12px;margin-top:8px;font-size:13px;color:var(--mango-deep);font-weight:600;
  }
  .autofill-bar.show{display:flex;}
  .autofill-bar button{white-space:nowrap;}
  .row-fill{background:none;border:none;color:var(--mango-deep);font-size:12px;font-weight:700;cursor:pointer;padding:2px 6px;text-decoration:underline;}
  .row-fill:hover{color:var(--tomato);}

  /* Hamburger + mobile drawer */
  .hamburger{
    display:none;flex-direction:column;justify-content:center;gap:4px;
    width:38px;height:34px;border:none;background:transparent;cursor:pointer;padding:0;
  }
  .hamburger span{display:block;width:100%;height:3px;border-radius:2px;background:var(--ink);}
  .drawer-overlay{
    display:none;position:fixed;inset:0;background:rgba(43,35,24,0.45);z-index:19;
  }
  .drawer-overlay.open{display:block;}
  .drawer{
    position:fixed;top:0;right:-280px;width:260px;height:100%;background:var(--paper);z-index:20;
    box-shadow:-4px 0 20px rgba(43,35,24,0.2);padding:20px 16px;transition:right .25s ease;
    display:flex;flex-direction:column;gap:6px;overflow-y:auto;
  }
  .drawer.open{right:0;}
  .drawer .tab{width:100%;text-align:left;font-size:16px;padding:11px 14px;}
  .drawer-close{align-self:flex-end;}

  /* Profile card */
  .profile-form{display:flex;flex-direction:column;gap:12px;max-width:420px;margin-bottom:24px;}
  .profile-form label{font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;color:var(--ink-soft);}
  .avatar-row{display:flex;align-items:center;gap:14px;}
  .avatar-preview{
    width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--line);
    border:3px solid var(--mango);
  }
  .toplift-row{display:flex;gap:8px;flex-wrap:wrap;}
  .toplift-row select{flex:1;min-width:130px;}

  .card-stage{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .gcard{
    position:relative;width:340px;max-width:100%;border-radius:22px;overflow:hidden;
    background:linear-gradient(160deg,#FFC845 0%,#FF8A3D 46%,#E8492A 100%);
    box-shadow:0 12px 30px rgba(232,73,42,0.28);color:#fff;padding:3px;
  }
  .gcard-inner{
    background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(0,0,0,0.12));
    border-radius:20px;padding:22px 20px 18px;position:relative;
  }
  .gcard-corner{position:absolute;width:26px;height:26px;opacity:0.85;}
  .gcard-corner.tl{top:8px;left:8px;border-top:2px solid #fff;border-left:2px solid #fff;border-radius:6px 0 0 0;}
  .gcard-corner.tr{top:8px;right:8px;border-top:2px solid #fff;border-right:2px solid #fff;border-radius:0 6px 0 0;}
  .gcard-corner.bl{bottom:8px;left:8px;border-bottom:2px solid #fff;border-left:2px solid #fff;border-radius:0 0 0 6px;}
  .gcard-corner.br{bottom:8px;right:8px;border-bottom:2px solid #fff;border-right:2px solid #fff;border-radius:0 0 6px 0;}
  .gcard-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .gcard-avatar{
    width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #fff;
    box-shadow:0 0 0 3px rgba(255,255,255,0.35);background:rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:24px;
  }
  .gcard-name{font-family:'Barlow Condensed';font-weight:800;font-size:24px;letter-spacing:0.02em;text-transform:uppercase;line-height:1.05;}
  .gcard-tag{font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.85;font-weight:600;}
  .gcard-bio{
    font-size:13px;line-height:1.5;background:rgba(0,0,0,0.16);border-radius:10px;padding:10px 12px;margin-bottom:14px;
    min-height:20px;
  }
  .gcard-stats{display:flex;flex-direction:column;gap:8px;}
  .gcard-stat{
    display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.16);
    border-radius:10px;padding:9px 12px;backdrop-filter:blur(2px);
  }
  .gcard-stat .rank{
    font-family:'Barlow Condensed';font-weight:800;font-size:15px;width:22px;height:22px;border-radius:50%;
    background:var(--ink);color:var(--yellow);display:flex;align-items:center;justify-content:center;margin-right:8px;
  }
  .gcard-stat .exname{font-weight:700;font-size:13.5px;flex:1;}
  .gcard-stat .exval{font-family:'Barlow Condensed';font-weight:800;font-size:17px;}
  .gcard-foot{margin-top:14px;text-align:center;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.75;}

  @media (max-width:640px){
    .day-title{font-size:24px;}
    .week-grid{grid-template-columns:repeat(2,1fr);}
    .week-row{grid-template-columns:28px repeat(7,minmax(0,1fr));}
    .weekday-row{grid-template-columns:28px repeat(7,1fr);}
    .tabs{display:none;}
    .hamburger{display:flex;}
    .nav{padding:14px 16px;}
    .brand{font-size:22px;}
  }
</style>
</head>

<script>
/* ===================================================================
   FIREBASE CONFIG — replace with your own project's settings.
   Get these from: Firebase Console → Project Settings → General →
   "Your apps" → Web app config. See README.md for the full walkthrough
   (creating the project, turning on Google sign-in, creating Firestore,
   and setting security rules).
=================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyASDyhK0ySwtX32GrqDzw7J6xwP7D9_5Rs",
  authDomain: "mngo-tracker.firebaseapp.com",
  projectId: "mngo-tracker",
  storageBucket: "mngo-tracker.appspot.com",
  messagingSenderId: "925786945537",
  appId: "1:925786945537:web:c3445129a44f68157c6800",
  measurementId: "G-JHZ2EFFBGZ"
};
const CLOUD_ENABLED = firebaseConfig.apiKey !== "YOUR_API_KEY";
     
let auth = null, db = null;
if(CLOUD_ENABLED){
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{ /* fine, e.g. multiple tabs or unsupported browser */ });
}
const Store = { uid:null, email:null, syncing:false };

/* ---------- storage helpers (local always mirrors; cloud used when signed in) ---------- */
function getLocalItem(key){
  try{ const raw = localStorage.getItem('loadout:'+key); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function setLocalItem(key, val){
  try{ localStorage.setItem('loadout:'+key, JSON.stringify(val)); }
  catch(e){ console.error('local storage set failed', e); }
}
function listLocalKeys(prefix){
  const out=[];
  const p = 'loadout:'+prefix;
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.startsWith(p)) out.push(k.slice('loadout:'.length));
  }
  return out;
}
function keyToRef(key){
  if(key.startsWith('day:')){
    const ds = key.slice(4);
    return db.collection('users').doc(Store.uid).collection('days').doc(ds);
  }
  return db.collection('users').doc(Store.uid).collection('meta').doc(key);
}
async function getItem(key){
  if(CLOUD_ENABLED && Store.uid){
    try{
      const snap = await keyToRef(key).get();
      if(snap.exists){ const v = snap.data().value; setLocalItem(key, v); return v; }
      return null;
    }catch(e){ console.error('cloud read failed, using local cache', e); }
  }
  return getLocalItem(key);
}
async function setItem(key, val){
  setLocalItem(key, val);
  if(CLOUD_ENABLED && Store.uid){
    try{ await keyToRef(key).set({ value: val, updatedAt: Date.now() }); }
    catch(e){ console.error('cloud write failed (saved locally instead)', e); }
  }
}
async function listKeys(prefix){
  if(CLOUD_ENABLED && Store.uid && prefix==='day:'){
    try{
      const snap = await db.collection('users').doc(Store.uid).collection('days').get();
      return snap.docs.map(d=>'day:'+d.id);
    }catch(e){ console.error('cloud list failed, using local cache', e); }
  }
  return listLocalKeys(prefix);
}

/* ---------- auth ---------- */
function signIn(){
  if(!CLOUD_ENABLED){ alert('Cloud sync isn\'t configured yet. See README.md for setup steps — until then your data is saved locally in this browser.'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e=>{ console.error(e); alert('Sign-in failed: '+e.message); });
}
function signOutUser(){ if(auth) auth.signOut(); }

async function migrateLocalToCloudIfNeeded(){
  try{
    const cloudEx = await db.collection('users').doc(Store.uid).collection('meta').doc('exercises').get();
    if(cloudEx.exists) return; // this account already has cloud data — never overwrite it
    const localKeys = listLocalKeys('');
    for(const k of localKeys){
      const val = getLocalItem(k);
      if(val!=null) await keyToRef(k).set({ value: val, updatedAt: Date.now() });
    }
  }catch(e){ console.error('migration to cloud failed', e); }
}

if(CLOUD_ENABLED){
  auth.onAuthStateChanged(async user=>{
    App.exercises = null; App.circuits = null;
    if(user){
      Store.uid = user.uid; Store.email = user.email;
      Store.syncing = true; render();
      await migrateLocalToCloudIfNeeded();
      Store.syncing = false;
    } else {
      Store.uid = null; Store.email = null;
    }
    render();
  });
}

/* ---------- date helpers ---------- */
function dateStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDateStr(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function mondayOf(d){ const r=new Date(d); const day=(r.getDay()+6)%7; r.setDate(r.getDate()-day); return r; }
function sameDate(a,b){ return dateStr(a)===dateStr(b); }
const WEEKDAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }

/* ---------- status helper for a day's data ---------- */
function dayStatus(data){
  if(!data || !data.lifts || data.lifts.length===0) return 'none';
  let total=0, done=0, hasOpt=false;
  data.lifts.forEach(l=>{
    if(l.optOut){ hasOpt=true; return; }
    (l.sets||[]).forEach(s=>{ total++; if(s.completed) done++; });
  });
  if(total===0) return hasOpt ? 'optout' : 'logged';
  if(done===total) return 'done';
  if(done>0) return 'partial';
  return 'logged';
}

/* ---------- in-memory day cache + debounced autosave ----------
   The day currently open is kept in memory so every keystroke/click just
   mutates this object and patches the DOM directly — no full page
   re-render, no lost scroll position, no lost focus while typing. */
const DayCache = {};
const saveTimers = {};
const miscTimers = {};
function getDC(ds){ return DayCache[ds]; }
function queueSave(ds, delay=500){
  markSaving();
  clearTimeout(saveTimers[ds]);
  saveTimers[ds] = setTimeout(async ()=>{ await saveDay(ds, DayCache[ds]); markSaved(); }, delay);
}
function saveNow(ds){
  markSaving();
  clearTimeout(saveTimers[ds]);
  saveDay(ds, DayCache[ds]).then(markSaved);
}
function debounce(key, fn, delay=500){
  clearTimeout(miscTimers[key]);
  miscTimers[key] = setTimeout(fn, delay);
}

/* ---- autofill suggestion: if an earlier set is fully filled and later
   sets in the same lift are blank, offer to copy those values forward
   (à la Hevy/TeamBuildr "same as last set"). ---- */
function autofillSuggestion(sets, isCircuit){
  if(!sets || sets.length===0) return null;
  let lastFilled = null, blanksAfter = [];
  for(let i=0;i<sets.length;i++){
    const s = sets[i];
    const filled = isCircuit
      ? (s.rounds!=='' && s.rounds!=null)
      : (s.reps!=='' && s.reps!=null && s.amount!=='' && s.amount!=null);
    if(filled){ lastFilled = s; blanksAfter = []; }
    else if(lastFilled){ blanksAfter.push(i); }
  }
  if(lastFilled && blanksAfter.length>0) return { source:lastFilled, indices:blanksAfter };
  return null;
}
function renderAutofillBar(ds, liftId, sets, isCircuit){
  const sug = autofillSuggestion(sets, isCircuit);
  if(!sug) return `<div class="autofill-bar" id="af-${liftId}"></div>`;
  const label = isCircuit ? `${sug.source.rounds}× rounds` : `${sug.source.reps} reps × ${sug.source.amount}`;
  return `<div class="autofill-bar show" id="af-${liftId}">
    <span>Fill ${sug.indices.length} remaining set${sug.indices.length>1?'s':''} with ${esc(label)}?</span>
    <button class="btn small" onclick="dvFillRemaining('${ds}','${liftId}')">Use</button>
  </div>`;
}
function refreshAutofillBar(ds, liftId){
  const d = getDC(ds); const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  const bar = document.getElementById('af-'+liftId);
  if(bar) bar.outerHTML = renderAutofillBar(ds, liftId, l.sets, l.kind==='circuit');
}
function dvFillRemaining(ds, liftId){
  const d = getDC(ds); const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  const isCircuit = l.kind==='circuit';
  const sug = autofillSuggestion(l.sets, isCircuit);
  if(!sug) return;
  sug.indices.forEach(i=>{
    if(isCircuit) l.sets[i].rounds = sug.source.rounds;
    else { l.sets[i].reps = sug.source.reps; l.sets[i].amount = sug.source.amount; }
  });
  saveNow(ds);
  refreshSetsTable(ds, liftId);
}

function renderSingleSetRow(ds, lift, i, isCircuit, isDist){

  if(isCircuit){
    return `<tr>
      <td>${i+1}</td>

            oninput="dvSetField('${ds}','${lift.id}',${i},'rounds',this.value)"></td>
      <td style="text-align:center"><input type="checkbox" class="chk done" ${s.completed?'checked':''}
            onchange="dvToggleSetBool('${ds}','${lift.id}',${i},'completed')" title="Completed"></td>
      <td><button class="row-del" onclick="dvRemoveSet('${ds}','${lift.id}',${i})" title="Remove">✕</button></td>
    </tr>`;
  }
  return `<tr>
    <td>${i+1}</td>
    <td><input type="number" min="0" value="${s.reps ?? ''}" placeholder="reps"
          oninput="dvSetField('${ds}','${lift.id}',${i},'reps',this.value)"></td>
    <td><input type="number" min="0" step="${isDist?1:2.5}" value="${s.amount ?? ''}" placeholder="${isDist?'metres':'lbs'}"
          oninput="dvSetField('${ds}','${lift.id}',${i},'amount',this.value)"></td>
    <td style="text-align:center"><input type="checkbox" class="chk done" ${s.completed?'checked':''}
          onchange="dvToggleSetBool('${ds}','${lift.id}',${i},'completed')" title="Completed"></td>
    <td style="text-align:center"><input type="checkbox" class="chk pr" ${s.pr?'checked':''}
          onchange="dvToggleSetBool('${ds}','${lift.id}',${i},'pr')" title="PR"></td>
    <td><button class="row-del" onclick="dvRemoveSet('${ds}','${lift.id}',${i})" title="Remove set">✕</button></td>
  </tr>`;
}
function renderSetRows(ds, lift, isCircuit, isDist){
  return (lift.sets||[]).map((s,i)=>renderSingleSetRow(ds, lift, i, isCircuit, isDist)).join('');
}
async function refreshSetsTable(ds, liftId){
  const d = getDC(ds); const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  const isCircuit = l.kind==='circuit';
  const ex = await getExercises();
  const isDist = !isCircuit && exerciseType(l.exercise, ex)==='distance';
  const tbody = document.getElementById('sets-body-'+liftId);
  if(tbody) tbody.innerHTML = renderSetRows(ds, l, isCircuit, isDist);
  refreshAutofillBar(ds, liftId);
}

function renderLiftCard(ds, lift, ex, circuits){
  const optedClass = lift.optOut ? 'opted' : '';
  const isCircuit = lift.kind === 'circuit';
  const isDist = !isCircuit && exerciseType(lift.exercise, ex)==='distance';

  let bodyHtml = '';
  if(!lift.optOut && isCircuit){
    bodyHtml = `
      <textarea class="reason-box" placeholder="Circuit description, e.g. 20m A-skip, 20m B-skip, 20m sprint @ 90%"
        oninput="dvSetCircuitDesc('${ds}','${lift.id}', this.value)">${esc(lift.description||'')}</textarea>
      <table class="sets">
        <thead><tr><th>#</th><th>Times Completed</th><th>Done</th><th></th></tr></thead>
        <tbody id="sets-body-${lift.id}">${renderSetRows(ds, lift, true, false)}</tbody>
      </table>
      ${renderAutofillBar(ds, lift.id, lift.sets, true)}
      <button class="btn ghost small add-set-btn" onclick="dvAddSet('${ds}','${lift.id}')">+ Log Attempt</button>
    `;
  } else if(!lift.optOut){
    bodyHtml = `
      <table class="sets">
        <thead><tr><th>#</th><th>Reps</th><th>${isDist?'Metres':'Weight'}</th><th>Done</th><th>PR</th><th></th></tr></thead>
        <tbody id="sets-body-${lift.id}">${renderSetRows(ds, lift, false, isDist)}</tbody>
      </table>
      ${renderAutofillBar(ds, lift.id, lift.sets, false)}
      <button class="btn ghost small add-set-btn" onclick="dvAddSet('${ds}','${lift.id}')">+ Add Set</button>
    `;
  }

  const reasonBox = lift.optOut ? `
    <textarea class="reason-box" placeholder="Why are you opting out of this lift?"
      oninput="dvSetReason('${ds}','${lift.id}', this.value)">${esc(lift.reason)}</textarea>
  ` : '';

  const notesBox = `
    <textarea class="reason-box notes-box" placeholder="Notes (optional) — how it felt, cues, anything worth remembering…"
      oninput="dvSetNotes('${ds}','${lift.id}', this.value)">${esc(lift.notes||'')}</textarea>
  `;

  const selectorHtml = isCircuit ? `
    <select class="exercise-select" onchange="dvSetCircuit('${ds}','${lift.id}', this.value)">
      ${circuits.map(c => `<option value="${esc(c.name)}" ${c.name===lift.exercise?'selected':''}>${esc(c.name)}</option>`).join('')}
    </select>
    <div class="newex-row">
      <input type="text" id="newcirc-${lift.id}" placeholder="or type new circuit…">
      <button class="btn ghost small" onclick="dvAddCustomCircuit('${ds}','${lift.id}')">Add</button>
    </div>
  ` : `
    <select class="exercise-select" onchange="dvSetExercise('${ds}','${lift.id}', this.value)">
      ${ex.map(e => `<option value="${esc(e.name)}" ${e.name===lift.exercise?'selected':''}>${esc(e.name)}</option>`).join('')}
    </select>
    <div class="newex-row">
      <input type="text" id="newex-${lift.id}" placeholder="or type new exercise…">
      <button class="btn ghost small" onclick="dvAddCustomExercise('${ds}','${lift.id}')">Add</button>
    </div>
  `;

  return `
    <div class="lift-card ${optedClass} ${isCircuit?'circuit':''}" id="lift-${lift.id}">
      <div class="lift-head">
        ${isCircuit ? '<span class="kind-badge">Circuit</span>' : ''}
        ${selectorHtml}
        <label class="optout-toggle">
          <input type="checkbox" class="chk opt" ${lift.optOut?'checked':''}
            onchange="dvToggleOptOut('${ds}','${lift.id}')"> Opt out
        </label>
      </div>
      ${bodyHtml}
      ${notesBox}
      ${reasonBox}
      <div class="lift-actions">
        <span></span>
        <button class="btn danger small" onclick="dvRemoveLift('${ds}','${lift.id}')">Remove</button>
      </div>
    </div>
  `;
}

  const ex = await getExercises();

/* day view mutation handlers — these patch just the affected DOM node(s),
   they never call the full render(), so the rest of the page (scroll
   position, other cards, focus) stays exactly where it was. */
function dvChangeDate(delta){ App.date = addDays(App.date, delta); render(); }
function dvGoToday(){ App.date = today0(); render(); }
function dvViewWeek(){ App.weekStart = mondayOf(App.date); App.view='week'; render(); }
function dvViewMonth(){ App.monthCursor = { y:App.date.getFullYear(), m:App.date.getMonth() }; App.view='month'; render(); }

async function dvAddLift(ds){
  const ex = await getExercises();
  const circuits = await getCircuits();
  const d = getDC(ds);
  const newLift = { id: uid(), kind:'exercise', exercise: ex[0]?.name || '', optOut:false, reason:'', notes:'', sets:[] };
  const wasEmpty = d.lifts.length===0;
  d.lifts.push(newLift);
  saveNow(ds);
  const list = document.getElementById('lifts-list');
  if(list){
    if(wasEmpty) list.innerHTML = '';
    list.insertAdjacentHTML('beforeend', renderLiftCard(ds, newLift, ex, circuits));
  }
}
async function dvAddCircuitLift(ds){
  const circuits = await getCircuits();
  const ex = await getExercises();
  const d = getDC(ds);
  const first = circuits[0];
  const newLift = { id: uid(), kind:'circuit', exercise: first?first.name:'', description: first?first.description:'', optOut:false, reason:'', notes:'', sets:[] };
  const wasEmpty = d.lifts.length===0;
  d.lifts.push(newLift);
  saveNow(ds);
  const list = document.getElementById('lifts-list');
  if(list){
    if(wasEmpty) list.innerHTML = '';
    list.insertAdjacentHTML('beforeend', renderLiftCard(ds, newLift, ex, circuits));
  }
}
function dvRemoveLift(ds, liftId){
  const d = getDC(ds);
  d.lifts = d.lifts.filter(l=>l.id!==liftId);
  saveNow(ds);

async function dvAddSet(ds, liftId){
  const d = getDC(ds);
  const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  const isCircuit = l.kind==='circuit';
  const prev = l.sets[l.sets.length-1];
  let newSet;
  if(isCircuit){
    newSet = { rounds: (prev && prev.rounds!=='' && prev.rounds!=null) ? prev.rounds : '', completed:false };
  } else {
    newSet = {
      reps: (prev && prev.reps!=='' && prev.reps!=null) ? prev.reps : '',
      amount: (prev && prev.amount!=='' && prev.amount!=null) ? prev.amount : '',
      completed:false, pr:false
    };
  }
  l.sets.push(newSet);
  saveNow(ds);
  const ex = await getExercises();
  const isDist = !isCircuit && exerciseType(l.exercise, ex)==='distance';
  const tbody = document.getElementById('sets-body-'+liftId);
  if(tbody){
    const idx = l.sets.length-1;
    tbody.insertAdjacentHTML('beforeend', renderSingleSetRow(ds, l, idx, isCircuit, isDist));
  }
  refreshAutofillBar(ds, liftId);
}
async function dvRemoveSet(ds, liftId, idx){
  const d = getDC(ds);
  const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  l.sets.splice(idx,1);
  saveNow(ds);
  await refreshSetsTable(ds, liftId);
}
function dvSetField(ds, liftId, idx, field, value){
  const d = getDC(ds);
  const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  l.sets[idx][field] = value===''? '' : Number(value);
  queueSave(ds);
  refreshAutofillBar(ds, liftId);
}
function dvToggleSetBool(ds, liftId, idx, field){
  const d = getDC(ds);
  const l = d.lifts.find(x=>x.id===liftId); if(!l) return;
  l.sets[idx][field] = !l.sets[idx][field];
  saveNow(ds);
}

/* ================= WEEK VIEW ================= */
async function renderWeekView(){
  const start = App.weekStart;
  const end = addDays(start, 6);
  let cards = '';
  for(let i=0;i<7;i++){
    const d = addDays(start, i);
    const ds = dateStr(d);
    const data = await getDay(ds);
    const status = dayStatus(data);
    const names = data.lifts.slice(0,3).map(l=>esc(l.exercise)).join(', ');
    const more = data.lifts.length>3 ? ` +${data.lifts.length-3} more` : '';
    cards += `
      <div class="day-card ${sameDate(d, today0())?'today':''}" onclick="wvGoToDay('${ds}')">
        <div class="dname">${WEEKDAY_NAMES[i]}</div>
        <div class="dnum">${d.getDate()}</div>
        <div><span class="status-dot dot-${status}"></span><span class="exlist">${statusLabel(status)}</span></div>
        <div class="exlist">${names}${more}</div>
      </div>
    `;
  }
  const rangeLabel = `${start.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  return `
    <div class="day-header">
      <div class="day-title display">${rangeLabel}</div>
      <div class="day-nav">
        <button class="icon-btn" onclick="wvChangeWeek(-1)">‹</button>
        <button class="btn ghost small" onclick="wvThisWeek()">This Week</button>
        <button class="icon-btn" onclick="wvChangeWeek(1)">›</button>
      </div>
      <div class="view-links"><button class="btn ghost small" onclick="setView('month')">View Month</button></div>
    </div>
    <div class="week-grid">${cards}</div>
  `;
}
function statusLabel(s){
  return {none:'No log', done:'All done', partial:'In progress', logged:'Logged', optout:'Opted out'}[s] || '';
}
function wvChangeWeek(delta){ App.weekStart = addDays(App.weekStart, delta*7); render(); }
function wvThisWeek(){ App.weekStart = mondayOf(today0()); render(); }
function wvGoToDay(ds){ App.date = parseDateStr(ds); App.view='day'; render(); }

/* ================= MONTH VIEW ================= */
async function renderMonthView(){
  const { y, m } = App.monthCursor;
  const firstOfMonth = new Date(y, m, 1);
  const gridStart = mondayOf(firstOfMonth);
  const monthLabel = `${MONTH_NAMES[m]} ${y}`;

  const keys = await listKeys('day:');
  const cache = {};
  const gridDates = [];
  for(let i=0;i<42;i++) gridDates.push(addDays(gridStart,i));
  const relevantKeys = gridDates.map(d=>'day:'+dateStr(d)).filter(k=>keys.includes(k));
  for(const k of relevantKeys){ cache[k] = await getItem(k); }

  let weeksHtml = '';
  for(let w=0; w<6; w++){
    const weekStart = addDays(gridStart, w*7);
    let cells = '';
    for(let i=0;i<7;i++){
      const d = addDays(weekStart, i);
      const ds = dateStr(d);
      const data = cache['day:'+ds] || { lifts: [] };
      const status = dayStatus(data);
      const outside = d.getMonth()!==m;
      cells += `
        <div class="month-cell ${outside?'outside':''} ${sameDate(d, today0())?'today':''}" onclick="mvGoToDay('${ds}')">
          <div class="mnum">${d.getDate()}</div>
          <span class="status-dot dot-${status}"></span>
        </div>
      `;
    }
    weeksHtml += `
      <div class="week-row">
        <button class="week-btn" onclick="mvGoToWeek('${dateStr(weekStart)}')" title="View week">WK</button>
        ${cells}
      </div>
    `;
  }

  return `
    <div class="month-head">
      <div class="day-title display">${monthLabel}</div>
      <div class="day-nav">
        <button class="icon-btn" onclick="mvChangeMonth(-1)">‹</button>
        <button class="btn ghost small" onclick="mvThisMonth()">Today</button>
        <button class="icon-btn" onclick="mvChangeMonth(1)">›</button>
      </div>
    </div>
    <div class="weekday-row"><div></div>${WEEKDAY_NAMES.map(n=>`<div>${n}</div>`).join('')}</div>
    ${weeksHtml}
  `;
}
function mvChangeMonth(delta){
  let { y, m } = App.monthCursor;
  m += delta;
  if(m<0){ m=11; y--; } else if(m>11){ m=0; y++; }
  App.monthCursor = { y, m };
  render();
}
function mvThisMonth(){ const t=today0(); App.monthCursor = { y:t.getFullYear(), m:t.getMonth() }; render(); }
function mvGoToDay(ds){ App.date = parseDateStr(ds); App.view='day'; render(); }
function mvGoToWeek(ds){ App.weekStart = parseDateStr(ds); App.view='week'; render(); }

/* ================= PROGRESS VIEW ================= */
/* Scans every logged day for a chosen exercise and plots EVERY working set
   (not just ones marked PR) as a dot: x = date, y = weight/distance.
   PR-marked sets are highlighted gold. Opted-out days show as a small
   red marker along the bottom. Click any dot/marker for full detail
   (reps, completed?, PR?, opt-out reason, notes). */
async function getProgressData(exerciseName){
  const keys = await listKeys('day:');
  const dates = keys.map(k=>k.slice(4)).sort();
  const points = [];    // {date, amount, reps, completed, pr, notes}
  const optouts = [];   // {date, reason, notes}
  for(const ds of dates){
    const data = await getItem('day:'+ds);
    if(!data || !data.lifts) continue;
    const lifts = data.lifts.filter(l => l.kind!=='circuit' && l.exercise===exerciseName);
    for(const l of lifts){
      if(l.optOut){ optouts.push({ date: ds, reason: l.reason||'', notes: l.notes||'' }); continue; }
      (l.sets||[]).forEach((s,i)=>{
        if(s.amount===''||s.amount==null) return;
        points.push({ date: ds, setNum: i+1, amount: Number(s.amount)||0, reps: s.reps, completed: !!s.completed, pr: !!s.pr, notes: l.notes||'' });
      });
    }
  }
  return { points, optouts };
}

async function renderProgressView(){
  const ex = await getExercises();
  const names = ex.map(e=>e.name);
  if(!App.progressExercise || !names.includes(App.progressExercise)) App.progressExercise = names[0] || null;

  const controls = `
    <div class="progress-controls">
      <label style="font-weight:600;font-size:14px;">Exercise:</label>
      <select onchange="pvSelectExercise(this.value)">
        ${names.length===0 ? '<option>No exercises yet</option>' :
          names.map(name=>`<option value="${esc(name)}" ${name===App.progressExercise?'selected':''}>${esc(name)}</option>`).join('')}
      </select>
    </div>
  `;

  if(!App.progressExercise){
    return controls + `<div class="empty-note">Add an exercise first, then log some sets to see progress here.</div>`;
  }

  const { points, optouts } = await getProgressData(App.progressExercise);
  App.progressPoints = points;
  App.progressOptouts = optouts;

  const unit = exerciseType(App.progressExercise, ex)==='distance' ? 'm' : 'lbs';
  const chart = renderProgressChart(points, optouts, unit);

  const legend = `
    <div class="legend">
      <span><span class="legend-dot pr"></span>PR</span>
      <span><span class="legend-dot done"></span>Completed</span>
      <span><span class="legend-dot logged"></span>Logged (not marked done)</span>
      <span><span class="legend-dot opt"></span>Opted out</span>
    </div>
  `;

  let detail = '';
  if(App.progressSelected){
    detail = renderProgressDetail(unit);
  }

  if(points.length===0 && optouts.length===0){
    return controls + `<div class="empty-note">No sets logged yet for ${esc(App.progressExercise)}.</div>`;
  }

  return `
    ${controls}
    ${legend}
    <div class="chart-wrap">${chart}</div>
    ${detail}
  `;
}
function pvSelectExercise(v){ App.progressExercise = v; App.progressSelected = null; render(); }
function pvShowSet(idx){ App.progressSelected = { type:'set', idx }; render(); }
function pvShowOptout(idx){ App.progressSelected = { type:'optout', idx }; render(); }
function pvCloseDetail(){ App.progressSelected = null; render(); }

function renderProgressChart(points, optouts, unit){
  if(points.length===0 && optouts.length===0) return `<div class="empty-note">No data to chart.</div>`;
  const w=800, h=320, padL=54, padR=20, padT=20, padB=54;

  const allDates = Array.from(new Set([...points.map(p=>p.date), ...optouts.map(o=>o.date)])).sort();
  const dateIdx = {}; allDates.forEach((d,i)=>dateIdx[d]=i);
  const n = allDates.length;
  const xFor = i => n<=1 ? (w-padL-padR)/2+padL : padL + i*(w-padL-padR)/(n-1);

  const amounts = points.map(p=>p.amount);
  const minA = amounts.length ? Math.min(0, ...amounts) : 0;
  const maxA = amounts.length ? Math.max(...amounts) : 1;
  const range = (maxA-minA) || 1;
  const yFor = a => h-padB - (a-minA)/range*(h-padT-padB);

  // small horizontal jitter so same-day multiple sets don't fully overlap
  const perDateCount = {};
  const dots = points.map((p,idx)=>{
    perDateCount[p.date] = (perDateCount[p.date]||0)+1;
    const seenSoFar = perDateCount[p.date]-1;
    const jitter = (seenSoFar - 1) * 5; // -5,0,5,10...
    const x = xFor(dateIdx[p.date]) + jitter;
    const y = yFor(p.amount);
    const fill = p.pr ? 'var(--yellow)' : (p.completed ? 'var(--mango)' : 'var(--paper)');
    const stroke = p.pr ? '#D9A424' : (p.completed ? 'var(--mango-deep)' : 'var(--ink-soft)');
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="6" fill="${fill}" stroke="${stroke}" stroke-width="1.5" style="cursor:pointer" onclick="pvShowSet(${idx})"><title>${esc(p.date)}: ${p.amount}${unit} × ${p.reps||'?'}</title></circle>`;
  }).join('');

  const optMarks = optouts.map((o,idx)=>{
    const x = xFor(dateIdx[o.date]);
    return `<rect x="${(x-6).toFixed(1)}" y="${(h-padB+10).toFixed(1)}" width="12" height="12" rx="3" fill="var(--tomato)" style="cursor:pointer" onclick="pvShowOptout(${idx})"><title>${esc(o.date)}: opted out</title></rect>`;
  }).join('');

  // y-axis gridlines/labels (4 steps)
  const steps=4;
  let gridLines = '';
  for(let s=0;s<=steps;s++){
    const val = minA + range*s/steps;
    const y = yFor(val);
    gridLines += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
    gridLines += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" font-size="11" fill="var(--ink-soft)" text-anchor="end">${Math.round(val)}</text>`;
  }

  // x-axis date labels: first, middle, last to avoid crowding
  let xLabels = '';
  const labelIdxs = n<=1 ? [0] : (n<=6 ? allDates.map((_,i)=>i) : [0, Math.floor((n-1)/2), n-1]);
  labelIdxs.forEach(i=>{
    if(i==null || !allDates[i]) return;
    const x = xFor(i);
    const label = parseDateStr(allDates[i]).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    xLabels += `<text x="${x.toFixed(1)}" y="${h-padB+34}" font-size="11" fill="var(--ink-soft)" text-anchor="middle">${label}</text>`;
  });

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
    ${gridLines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--ink-soft)" stroke-width="1.5"/>
    ${xLabels}
    ${dots}
    ${optMarks}
  </svg>`;
}

function renderProgressDetail(unit){
  const sel = App.progressSelected;
  if(sel.type==='set'){
    const p = App.progressPoints[sel.idx];
    if(!p) return '';
    const dateLabel = parseDateStr(p.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    return `
      <div class="detail-card">
        <button class="icon-btn detail-close" onclick="pvCloseDetail()" title="Close">✕</button>
        <h4>Set ${p.setNum} — ${dateLabel}</h4>
        <div class="detail-row"><span class="k">Weight/Distance</span><span>${p.amount} ${unit}</span></div>
        <div class="detail-row"><span class="k">Reps</span><span>${p.reps || '—'}</span></div>
        <div class="detail-row"><span class="k">Completed</span><span>${p.completed ? 'Yes' : 'No'}</span></div>
        <div class="detail-row"><span class="k">PR</span><span>${p.pr ? '★ Yes' : 'No'}</span></div>
        <div class="detail-row"><span class="k">Notes</span><span>${p.notes ? esc(p.notes) : '—'}</span></div>
      </div>
    `;
  } else {
    const o = App.progressOptouts[sel.idx];
    if(!o) return '';
    const dateLabel = parseDateStr(o.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    return `
      <div class="detail-card">
        <button class="icon-btn detail-close" onclick="pvCloseDetail()" title="Close">✕</button>
        <h4>Opted Out — ${dateLabel}</h4>
        <div class="detail-row"><span class="k">Reason</span><span>${o.reason ? esc(o.reason) : '—'}</span></div>
        <div class="detail-row"><span class="k">Notes</span><span>${o.notes ? esc(o.notes) : '—'}</span></div>
      </div>
    `;
  }
}

  if(e){ e.type = type; await saveExercises(ex); }
  render();

  let p = await getItem('profile');

}

function resizeImageFile(file, maxSize){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width>height){ if(width>maxSize){ height*=maxSize/width; width=maxSize; } }
        else { if(height>maxSize){ width*=maxSize/height; height=maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width=Math.round(width); canvas.height=Math.round(height);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.85));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function getBestForExercise(name){
  if(!name) return null;
  const { points } = await getProgressData(name);
  if(points.length===0) return null;
  let best = points[0];
  points.forEach(p=>{ if((p.amount||0) > (best.amount||0)) best = p; });
  return best;
}

async function refreshGCard(){

/* ---- canvas export so the card can be saved/shared as an image ---- */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function loadImageEl(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload=()=>resolve(img);
    img.onerror=reject;
    img.src=src;
  });
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const words = String(text).split(' ');
  let line = '', curY = y, drawn = 0;
  for(let n=0;n<words.length;n++){
    const testLine = line + words[n] + ' ';
    if(ctx.measureText(testLine).width > maxWidth && line !== ''){
      if(drawn>=maxLines-1){ ctx.fillText(line.trim()+'…', x, curY); return; }
      ctx.fillText(line, x, curY);
      line = words[n] + ' ';
      curY += lineHeight;
      drawn++;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, curY);
}
async function pfDownloadCard(){
  if(document.fonts && document.fonts.ready) await document.fonts.ready;
  const profile = App.profile;
  const W=680, H=880;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#FFC845'); grad.addColorStop(0.46,'#FF8A3D'); grad.addColorStop(1,'#E8492A');
  roundRect(ctx,0,0,W,H,44); ctx.fillStyle=grad; ctx.fill();

  ctx.save();
  roundRect(ctx,10,10,W-20,H-20,38); ctx.clip();
  const grad2 = ctx.createLinearGradient(0,0,0,H);
  grad2.addColorStop(0,'rgba(255,255,255,0.08)'); grad2.addColorStop(1,'rgba(0,0,0,0.14)');
  ctx.fillStyle=grad2; ctx.fillRect(10,10,W-20,H-20);
  ctx.restore();

  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=4;
  const c=52;
  ctx.beginPath(); ctx.moveTo(30,30+c); ctx.lineTo(30,30); ctx.lineTo(30+c,30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-30-c,30); ctx.lineTo(W-30,30); ctx.lineTo(W-30,30+c); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30,H-30-c); ctx.lineTo(30,H-30); ctx.lineTo(30+c,H-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-30-c,H-30); ctx.lineTo(W-30,H-30); ctx.lineTo(W-30,H-30-c); ctx.stroke();

  const avR=70, avX=110, avY=118;
  ctx.save();
  ctx.beginPath(); ctx.arc(avX,avY,avR,0,Math.PI*2); ctx.closePath(); ctx.clip();
  if(profile.avatar){
    try{
      const img = await loadImageEl(profile.avatar);
      ctx.drawImage(img, avX-avR, avY-avR, avR*2, avR*2);
    }catch(e){ ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(avX-avR,avY-avR,avR*2,avR*2); }
  } else {
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(avX-avR,avY-avR,avR*2,avR*2);
    ctx.fillStyle='#fff'; ctx.font='700 48px "Barlow Condensed", sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((profile.username||'?').slice(0,1).toUpperCase(), avX, avY+4);
  }
  ctx.restore();
  ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(avX,avY,avR,0,Math.PI*2); ctx.stroke();

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='600 15px Inter, sans-serif';
  ctx.fillText('TRAINING LOG', avX+avR+24, avY-16);
  ctx.fillStyle='#fff'; ctx.font='800 40px "Barlow Condensed", sans-serif';
  ctx.fillText((profile.username||'Athlete').toUpperCase(), avX+avR+24, avY+22);

  const bioY = 220;
  ctx.fillStyle='rgba(0,0,0,0.16)';
  roundRect(ctx, 60, bioY, W-120, 96, 16); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='400 18px Inter, sans-serif';
  wrapText(ctx, profile.bio || 'No description yet.', 78, bioY+34, W-156, 24, 3);

  let statY = bioY + 130;
  for(let i=0;i<3;i++){
    const name = profile.topLifts[i];
    if(!name) continue;
    const best = await getBestForExercise(name);
    const unit = exerciseType(name)==='distance' ? 'm' : 'lbs';
    const valLabel = best ? `${best.amount}${unit}` : '—';
    ctx.fillStyle='rgba(255,255,255,0.16)';
    roundRect(ctx, 60, statY, W-120, 64, 14); ctx.fill();
    ctx.fillStyle='#2B2318';
    ctx.beginPath(); ctx.arc(96, statY+32, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFC845'; ctx.font='800 20px "Barlow Condensed", sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(i+1), 96, statY+33);
    ctx.textAlign='left';
    ctx.fillStyle='#fff'; ctx.font='700 19px Inter, sans-serif';
    ctx.fillText(name, 128, statY+38);
    ctx.textAlign='right'; ctx.font='800 24px "Barlow Condensed", sans-serif';
    ctx.fillText(valLabel, W-80, statY+40);
    ctx.textAlign='left';
    statY += 78;
  }

  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.font='600 13px Inter, sans-serif';
  ctx.fillText('MNGO · LOADOUT CARD', W/2, H-40);

  const a = document.createElement('a');
  a.download = (profile.username ? profile.username.replace(/[^a-z0-9]/gi,'_') : 'training') + '-card.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

/* ================= EXPORT VIEW ================= */
async function exGatherRange(fromDs, toDs){
  const keys = await listKeys('day:');
  const ex = await getExercises();
  const relevant = keys.map(k=>k.slice(4)).filter(ds => ds>=fromDs && ds<=toDs).sort();
  const days = [];
  for(const ds of relevant){
    const data = await getItem('day:'+ds);
    if(!data || !data.lifts || data.lifts.length===0) continue;
    days.push({ date: ds, lifts: data.lifts, ex });
  }
  return days;
}
function exDefaultRange(){
  if(!App.exportTo) App.exportTo = dateStr(today0());
  if(!App.exportFrom) App.exportFrom = dateStr(addDays(today0(), -28));
}
async function renderExportView(){
  exDefaultRange();
  return `
    <h3 style="margin-bottom:14px;">Export Your Log</h3>
    <div class="export-controls">
      <div class="export-field">
        <label>From</label>
        <input type="date" value="${App.exportFrom}" onchange="exSetFrom(this.value)">
      </div>
      <div class="export-field">
        <label>To</label>
        <input type="date" value="${App.exportTo}" onchange="exSetTo(this.value)">
      </div>
    </div>
    <div class="export-actions">
      <button class="btn" onclick="exPrintable()">🖨 Printable / Shareable Page</button>
      <button class="btn ghost" onclick="exCsv()">⬇ Download CSV</button>
    </div>
    <div class="empty-note" style="padding-top:24px;text-align:left;">
      The printable page opens in a new tab formatted for reading or printing to PDF (use your browser's
      Print → Save as PDF). The CSV opens cleanly in Excel, Google Sheets, or Numbers.
    </div>
  `;
}
function exSetFrom(v){ App.exportFrom = v; render(); }
function exSetTo(v){ App.exportTo = v; render(); }

async function exPrintable(){
  const days = await exGatherRange(App.exportFrom, App.exportTo);
  const fromLabel = parseDateStr(App.exportFrom).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const toLabel = parseDateStr(App.exportTo).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  const daysHtml = days.map(d => {
    const label = parseDateStr(d.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const liftsHtml = d.lifts.map(l=>{
      if(l.optOut){
        return `<div class="pd-lift"><strong>${esc(l.exercise)}</strong> — <em>Opted out${l.reason?': '+esc(l.reason):''}</em></div>`;
      }
      if(l.kind==='circuit'){
        const rows = (l.sets||[]).map((s,i)=>`Attempt ${i+1}: ${s.rounds||'—'} rounds${s.completed?' ✓':''}`).join('<br>');
        return `<div class="pd-lift"><strong>${esc(l.exercise)}</strong> <span class="pd-desc">${esc(l.description||'')}</span><br>${rows}${l.notes?'<br><em>Notes: '+esc(l.notes)+'</em>':''}</div>`;
      }
      const type = exerciseType(l.exercise, d.ex);
      const unit = type==='distance' ? 'm' : 'lbs';
      const rows = (l.sets||[]).map((s,i)=>`Set ${i+1}: ${s.amount ?? '—'}${unit} × ${s.reps ?? '—'} reps${s.completed?' ✓':''}${s.pr?' ★PR':''}`).join('<br>');
      return `<div class="pd-lift"><strong>${esc(l.exercise)}</strong><br>${rows}${l.notes?'<br><em>Notes: '+esc(l.notes)+'</em>':''}</div>`;
    }).join('');
    return `<div class="pd-day"><h3>${label}</h3>${liftsHtml}</div>`;
  }).join('');

  const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Mngo — Training Log Export</title>
  <style>
    body{font-family:Georgia,'Times New Roman',serif;color:#2B2318;max-width:760px;margin:30px auto;padding:0 20px;}
    h1{font-family:Arial,sans-serif;font-size:26px;border-bottom:3px solid #FF8A3D;padding-bottom:10px;}
    .range{color:#6B5F4F;font-size:13px;margin-bottom:24px;font-family:Arial,sans-serif;}
    .pd-day{margin-bottom:22px;page-break-inside:avoid;}
    .pd-day h3{font-family:Arial,sans-serif;font-size:16px;background:#FFF3E6;padding:6px 10px;border-left:4px solid #FF8A3D;margin-bottom:8px;}
    .pd-lift{margin:6px 0 10px 10px;font-size:14px;line-height:1.5;}
    .pd-desc{color:#6B5F4F;font-size:12.5px;}
    @media print{ button{display:none;} }
  </style></head>
  <body>
    <button onclick="window.print()" style="float:right;font-family:Arial,sans-serif;padding:8px 16px;border-radius:6px;border:1px solid #ccc;cursor:pointer;">Print / Save as PDF</button>
    <h1>Mngo — Training Log</h1>
    <div class="range">${fromLabel} – ${toLabel}</div>
    ${daysHtml || '<p>No workouts logged in this range.</p>'}
  </body></html>`;

  const win = window.open('', '_blank');
  if(!win){ alert('Your browser blocked the popup — please allow popups for this site and try again.'); return; }
  win.document.write(doc);
  win.document.close();
}

async function exCsv(){
  const days = await exGatherRange(App.exportFrom, App.exportTo);
  const header = ['Date','Exercise','Kind','SetNum','Reps','Amount','Unit','Completed','PR','OptedOut','Reason','Notes'];
  const rows = [header];
  days.forEach(d=>{
    d.lifts.forEach(l=>{
      if(l.optOut){
        rows.push([d.date, l.exercise, l.kind||'exercise', '', '', '', '', '', '', 'Yes', l.reason||'', l.notes||'']);
        return;
      }
      if(l.kind==='circuit'){
        (l.sets||[]).forEach((s,i)=>{
          rows.push([d.date, l.exercise, 'circuit', i+1, '', s.rounds||'', 'rounds', s.completed?'Yes':'No', '', 'No', '', l.notes||'']);
        });
      } else {
        const unit = exerciseType(l.exercise, d.ex)==='distance' ? 'm' : 'lbs';
        (l.sets||[]).forEach((s,i)=>{
          rows.push([d.date, l.exercise, 'exercise', i+1, s.reps??'', s.amount??'', unit, s.completed?'Yes':'No', s.pr?'Yes':'No', 'No', '', l.notes||'']);
        });
      }
    });
  });
  const csv = rows.map(r => r.map(cell => {
    const v = String(cell ?? '');
    return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }).join(',')).join('\n');

  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mngo-log_${App.exportFrom}_to_${App.exportTo}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ================= CIRCUITS VIEW ================= */
async function renderCircuitsView(){
  const circuits = await getCircuits();
  const rows = circuits.map(c=>`
    <div class="circuit-tpl">
      <div class="circuit-tpl-head">
        <strong>${esc(c.name)}</strong>
        <button class="row-del" onclick="circRemove('${encodeURIComponent(c.name)}')" title="Remove">✕</button>
      </div>
      <textarea class="reason-box" onchange="circSetDesc('${encodeURIComponent(c.name)}', this.value)"
        placeholder="Describe the circuit, e.g. 20m A-skip, 20m B-skip, 20m sprint @ 90%">${esc(c.description||'')}</textarea>
    </div>
  `).join('');
  return `
    <h3 style="margin-bottom:14px;">Your Circuits</h3>
    <div class="circuit-list">${rows || '<span class="exlist">No circuits yet. Add one below — e.g. name it "Bullet" and describe it as 20m A-skip, 20m B-skip, 20m sprint @ 90%.</span>'}</div>
    <div class="add-ex-row">
      <input type="text" id="new-circuit-name" placeholder="Circuit name, e.g. Bullet">
    </div>
    <textarea class="reason-box" id="new-circuit-desc" placeholder="Description, e.g. 20m A-skip, 20m B-skip, 20m sprint @ 90%" style="margin:8px 0;"></textarea>
    <button class="btn" onclick="circAdd()">+ Add Circuit</button>
  `;
}
async function circAdd(){
  const nameInp = document.getElementById('new-circuit-name');
  const descInp = document.getElementById('new-circuit-desc');
  const name = (nameInp.value||'').trim();
  const desc = (descInp.value||'').trim();
  if(!name) return;
  const circuits = await getCircuits();
  if(!circuits.find(c=>c.name===name)) circuits.push({name, description:desc});
  await saveCircuits(circuits);
  render();
}
async function circRemove(encodedName){
  const name = decodeURIComponent(encodedName);
  let circuits = await getCircuits();
  circuits = circuits.filter(c=>c.name!==name);
  await saveCircuits(circuits);
  render();
}
async function circSetDesc(encodedName, value){
  const name = decodeURIComponent(encodedName);
  let circuits = await getCircuits();
  const c = circuits.find(x=>x.name===name);
  if(c){ c.description = value; await saveCircuits(circuits); }
}
